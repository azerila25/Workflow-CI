name: Workflow CI and Docker Build
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # Diperbarui ke v4

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5  # Diperbarui ke v5
      with:
        python-version: '3.12.7'

    - name: Install dependencies
      run: |
        pip install mlflow==2.19.0 pandas scikit-learn

    - name: Run MLflow project
      run: |
        # Perubahan: --no-conda diganti menjadi --env-manager local
        mlflow run MLProject/ --env-manager local
        
        # Mengambil RUN_ID terbaru
        RUN_ID=$(ls -t mlruns/0 | grep -v "meta.yaml" | head -n 1)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

    - name: Upload Artifact to GitHub
      uses: actions/upload-artifact@v4  # Ini yang tadi bikin error, sekarang pakai v4
      with:
        name: mlflow-artifacts
        path: mlruns/

    - name: Log in to Docker Hub
      uses: docker/login-action@v3  # Diperbarui ke v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Model
      run: |
        mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n ${{ secrets.DOCKER_USERNAME }}/ml-model:latest

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/ml-model:latest