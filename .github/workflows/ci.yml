name: Workflow CI and Docker Build
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install dependencies
      run: |
        pip install mlflow==2.19.0 pandas scikit-learn

    - name: Run MLflow project
      run: |
        mlflow run MLProject/ --no-conda
        # Mengambil RUN_ID terbaru dari folder mlruns
        RUN_ID=$(ls -t mlruns/0 | grep -v "meta.yaml" | head -n 1)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

    - name: Upload Artifact to GitHub
      uses: actions/upload-artifact@v3
      with:
        name: mlflow-artifacts
        path: mlruns/

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Model
      run: |
        # Membangun image Docker menggunakan model dari run ID yang didapat
        mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n ${{ secrets.DOCKER_USERNAME }}/ml-model:latest

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/ml-model:latest