name: Workflow CI and Docker Build

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install mlflow==2.19.0 pandas scikit-learn

    - name: Run MLflow project
      run: |
        mlflow run MLProject/ --env-manager local

    - name: Get MLflow Run ID
      run: |
        # Cari folder experiment (angka), abaikan folder lain seperti 'models', '.trash'
        EXP_ID=$(ls mlruns/ | grep -E '^[0-9]+$' | sort -n | head -n 1)
        echo "Found experiment: $EXP_ID"

        # Cari run ID (hash 32 karakter hex), abaikan meta.yaml
        RUN_ID=$(ls mlruns/$EXP_ID/ | grep -E '^[a-f0-9]{32}$' | head -n 1)
        echo "Found run ID: $RUN_ID"

        if [ -z "$RUN_ID" ]; then
          echo "ERROR: RUN_ID tidak ditemukan!"
          ls -la mlruns/$EXP_ID/
          exit 1
        fi

        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

    - name: Upload MLflow Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-artifacts
        path: mlruns/

    - name: Build Docker Image
      run: |
        echo "Building Docker image for run: ${{ env.RUN_ID }}"
        mlflow models build-docker \
          -m "runs:/${{ env.RUN_ID }}/model" \
          -n "${{ secrets.DOCKER_USERNAME }}/ml-model:latest"

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/ml-model:latest